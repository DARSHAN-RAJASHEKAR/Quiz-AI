services:
  # ── FastAPI Backend ────────────────────────────────────────────
  - type: web
    name: ai-quiz-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-quiz-db
          property: connectionString
      - key: RABBITMQ_URL
        sync: false   # paste CloudAMQP URL in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: 20
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false   # paste your Vercel URL in Render dashboard
      - key: LOG_LEVEL
        value: INFO
    buildCommand: ""
    startCommand: "sh start.sh"

  # ── Python AI Worker ──────────────────────────────────────────
  - type: worker
    name: ai-quiz-worker
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: ./worker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-quiz-db
          property: connectionString
      - key: RABBITMQ_URL
        sync: false   # same CloudAMQP URL
      - key: OPENROUTER_KEY
        sync: false   # paste your OpenRouter API key
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: 20
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: ai-quiz-db
    plan: free
    databaseName: quizdb
    user: quizapp
